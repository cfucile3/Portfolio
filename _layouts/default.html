<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─── TOKENS ─────────────────────────────────────────────── */
    :root {
      --space-indigo:      #202D46;
      --prussian-blue:  #1B263B;
      --navy-card: #172847;
      --slate:     #4A6080;
      --slate-lt:  #8BA3C0;
      --off-white: #E8EDF5;
      --white:     #F4F7FC;
      --cyan:      #00C8FF;
      --cyan-dim:  rgba(0,200,255,0.15);
      --mono:      'JetBrains Mono', monospace;
      --display:   'Space Grotesk', sans-serif;
      --body:      'Inter', sans-serif;
    }

    /* ─── RESET ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--space-indigo);
      color: var(--off-white);
      font-family: var(--body);
      font-size: 1rem;
      line-height: 1.7;
      min-height: 100vh;
    }

    a { color: var(--cyan); text-decoration: none; }
    a:hover { text-decoration: underline; }
    img { max-width: 100%; height: auto; display: block; border-radius: 4px; }

    /* ─── NAV ────────────────────────────────────────────────── */
    .site-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(11,22,40,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(139,163,192,0.15);
      padding: 0 clamp(1.5rem, 5vw, 4rem);
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    .nav-logo {
      font-family: var(--display);
      font-size: 1rem;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 0.02em;
    }
    .nav-logo span { color: var(--cyan); }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--slate-lt);
      transition: color 0.2s;
    }
    .nav-links a:hover,
    .nav-links a.active { color: var(--cyan); text-decoration: none; }

    /* ─── MAIN CONTENT WRAPPER ───────────────────────────────── */
    .page-content {
      max-width: 900px;
      margin: 0 auto;
      padding: clamp(2rem, 6vw, 5rem) clamp(1.5rem, 5vw, 2.5rem);
    }

    /* ─── SECTION LABEL ──────────────────────────────────────── */
    .section-label {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(139,163,192,0.2);
    }

    /* ─── PAGE TITLE ─────────────────────────────────────────── */
    .page-title {
      font-family: var(--display);
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 1rem;
    }

    .page-subtitle {
      color: var(--slate-lt);
      font-size: 1.05rem;
      margin-bottom: 3.5rem;
      max-width: 620px;
    }

    /* ─── CARDS ──────────────────────────────────────────────── */
    .card {
      background: var(--navy-card);
      border: 1px solid rgba(139,163,192,0.12);
      border-radius: 6px;
      padding: 2rem 2.25rem;
      margin-bottom: 2rem;
    }

    .card h3 {
      font-family: var(--display);
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 0.5rem;
    }

    .card .card-meta {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--slate-lt);
      margin-bottom: 1rem;
      text-transform: uppercase;
    }

    .card p {
      color: var(--slate-lt);
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }

    /* ─── TAGS / PILLS ───────────────────────────────────────── */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .tag {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      padding: 0.25rem 0.65rem;
    }

    /* ─── PROJECT IMAGES ─────────────────────────────────────── */
    .img-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .img-group img {
      width: 100%;
      border: 1px solid rgba(139,163,192,0.15);
    }

    /* ─── CODE BLOCKS ────────────────────────────────────────── */
    pre, code {
      font-family: var(--mono);
      font-size: 0.8rem;
    }

    pre {
      background: #0D1E36;
      border: 1px solid rgba(139,163,192,0.15);
      border-left: 3px solid rgba(0,200,255,0.4);
      border-radius: 4px;
      padding: 1.25rem 1.5rem;
      overflow-x: auto;
      margin: 1.25rem 0;
      color: #a8c4e0;
      line-height: 1.6;
    }

    code { color: var(--cyan); background: rgba(0,200,255,0.08); padding: 0.1em 0.35em; border-radius: 3px; }
    pre code { background: none; padding: 0; color: inherit; }

    /* ─── METHODOLOGY LIST ───────────────────────────────────── */
    .method-list {
      list-style: none;
      margin: 1rem 0 1.25rem;
    }

    .method-list li {
      font-size: 0.9rem;
      color: var(--slate-lt);
      padding: 0.3rem 0 0.3rem 1.4rem;
      position: relative;
    }

    .method-list li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--cyan);
      font-family: var(--mono);
    }

    /* ─── RESULTS BLOCK ──────────────────────────────────────── */
    .results-block {
      background: rgba(0,200,255,0.05);
      border: 1px solid rgba(0,200,255,0.15);
      border-radius: 4px;
      padding: 1.25rem 1.5rem;
      margin-top: 1rem;
      font-size: 0.9rem;
      color: var(--slate-lt);
    }

    .results-block strong {
      color: var(--cyan);
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 0.5rem;
    }

    /* ─── SECTION DIVIDER ────────────────────────────────────── */
    .divider {
      border: none;
      border-top: 1px solid rgba(139,163,192,0.12);
      margin: 3rem 0;
    }

    /* ─── HIGHLIGHT PILLS (stats) ────────────────────────────── */
    .stat-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 1.25rem 0 2rem;
    }

    .stat-pill {
      background: var(--prussian-blue);
      border: 1px solid rgba(139,163,192,0.15);
      border-radius: 4px;
      padding: 0.6rem 1.1rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--slate-lt);
    }

    .stat-pill span {
      display: block;
      font-size: 1.3rem;
      font-family: var(--display);
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    /* ─── FOOTER ─────────────────────────────────────────────── */
    .site-footer {
      border-top: 1px solid rgba(139,163,192,0.1);
      padding: 2.5rem clamp(1.5rem, 5vw, 4rem);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .footer-name {
      font-family: var(--display);
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--slate-lt);
    }

    .footer-links {
      display: flex;
      gap: 1.5rem;
    }

    .footer-links a {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--slate);
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--cyan); text-decoration: none; }

    /* ─── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 600px) {
      .nav-links { gap: 1.25rem; }
      .nav-links a { font-size: 0.65rem; }
      .card { padding: 1.5rem; }
      .stat-row { gap: 0.75rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="site-nav" role="navigation" aria-label="Main navigation">
    <a class="nav-logo" href="{{ '/' | relative_url }}">
      {{ site.author.name | split: ' ' | first }}</span>
    </a>
    <ul class="nav-links">
      <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a></li>
      <li><a href="{{ '/research/' | relative_url }}"{% if page.url contains 'research' %} class="active"{% endif %}>Research</a></li>
      <li><a href="{{ '/projects/' | relative_url }}"{% if page.url contains 'projects' %} class="active"{% endif %}>Projects</a></li>
    </ul>
  </nav>

  <!-- MAIN -->
  <main>
    {{ content }}
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p class="footer-name">{{ site.author.name }} · {{ site.description }}</p>
    <div class="footer-links">
      <a href="mailto:{{ site.author.email }}">Email</a>
      <a href="{{ site.author.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
      <a href="{{ site.author.github }}" target="_blank" rel="noopener">GitHub</a>
    </div>
  </footer>

</body>
</html>
