title: "Charles Fucile"
description: "Aerospace Engineering Student @ Georgia Tech"
url: "https://cfucile3.github.io"
baseurl: ""

# Author info
author:
  name: "Charles Fucile"
  bio: "Aerospace Engineering @ Georgia Tech · CFD · Orbital Mechanics · Controls"
  email: "cfucile3@gatech.edu"
  linkedin: "https://linkedin.com/in/charles-fucile"
  github: "https://github.com/cfucile3"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - README.md

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
